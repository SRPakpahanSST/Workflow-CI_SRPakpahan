name: MLflow CI with Docker Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          pip install mlflow scikit-learn pandas numpy matplotlib seaborn joblib dagshub

      - name: Run MLflow Project
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
        run: |
          mlflow run MLproject/ --env-manager=local --experiment-name "CI_Experiment"

      - name: List artifacts
        run: ls -la mlruns/

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          RUN_ID=$(ls -t mlruns/0/ | head -1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          mlflow models build-docker -m "runs:/$RUN_ID/random_forest_model" -n "srpakpahan/titanic-model:latest"
          docker push srpakpahan/titanic-model:latest
